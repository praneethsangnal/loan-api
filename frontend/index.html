<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Loan Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app">

    <header class="site-header">
      <div class="header-icon">&#127891;</div>
      <div>
        <h1>Student Loan Finder</h1>
        <p class="subtitle">Discover education loan schemes matched to your profile</p>
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('manual', this)">
        <span class="tab-icon">&#128203;</span> Manual Search
      </button>
      <button class="tab-btn" onclick="switchTab('ai', this)">
        <span class="tab-icon">&#129504;</span> AI Search
      </button>
    </div>

    <!-- MANUAL SEARCH -->
    <div id="tab-manual" class="tab-panel active">
      <div class="card">

        <div class="section-label">Academic Details</div>

        <div class="field">
          <label for="marks">Class 12 Marks</label>
          <div class="marks-row">
            <input type="range" id="marks" min="0" max="100" value="75" oninput="updateMarks(this.value)">
            <div class="marks-display" id="marks-display">75%</div>
          </div>
          <div class="range-labels"><span>0%</span><span>50%</span><span>100%</span></div>
        </div>

        <div class="section-label" style="margin-top: 1.5rem;">Personal Details</div>

        <div class="field-grid">
          <div class="field">
            <label for="state">State</label>
            <select id="state">
              <option value="">Select your state</option>
              <!-- (your options unchanged) -->
            </select>
          </div>

          <div class="field">
            <label for="caste">Caste Category</label>
            <select id="caste">
              <option value="">Select category</option>
              <option value="General">General</option>
              <option value="OBC">OBC</option>
              <option value="SC">SC</option>
              <option value="ST">ST</option>
              <option value="EWS">EWS</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Gender</label>
          <div class="chips">
            <button class="chip selected" onclick="selectChip(this, 'gender', 'Male')">Male</button>
            <button class="chip" onclick="selectChip(this, 'gender', 'Female')">Female</button>
            <button class="chip" onclick="selectChip(this, 'gender', 'Other')">Other / Prefer not to say</button>
          </div>
          <input type="hidden" id="gender" value="Male">
        </div>

        <div class="form-footer">
          <button class="submit-btn" onclick="searchManual()">
            Find Loans <span class="btn-arrow">&#8594;</span>
          </button>
        </div>

      </div>
    </div>

    <!-- AI SEARCH -->
    <div id="tab-ai" class="tab-panel">
      <div class="card">
        <div class="field">
          <label for="aiQuery">Describe your situation</label>
          <textarea id="aiQuery" rows="5" placeholder="e.g. I scored 82% in class 12..."></textarea>
          <p class="helper-text">Include your marks, state, category, and course of interest for better results.</p>
        </div>
        <div class="form-footer">
          <button class="submit-btn" onclick="searchAI()">
            Search with AI <span class="btn-arrow">&#8594;</span>
          </button>
        </div>
      </div>
    </div>

    <!-- RESULTS -->
    <div class="results-area" id="results-area" style="display:none;">
      
      <!-- LOADING INDICATOR -->
      <div id="loading" style="display:none;">
        <div class="loading-header">
          <div class="loading-spinner"></div>
          <span class="loading-text">Fetching best loans for you…</span>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-line wide"></div>
          <div class="skeleton-meta">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line short"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-line wide"></div>
          <div class="skeleton-meta">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line short"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-line wide"></div>
          <div class="skeleton-meta">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line short"></div>
          </div>
        </div>
      </div>

      <p class="results-title" id="results-title">Results</p>
      <div id="results"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
